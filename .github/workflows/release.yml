name: Build & Pre-Release

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            platform: windows
            arch: amd64
            ext: .exe

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            ext: ""

          # Linux ARM64 (native ARM runner)
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            ext: ""

          # macOS Apple Silicon (Intel Mac 已淘汰)
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install caxa
        run: npm install caxa --save-dev

      - name: Prepare build directory
        shell: bash
        run: |
          mkdir -p .build

          cp server.js .build/
          cp package.json .build/
          cp -r lib .build/
          cp -r public .build/

          cd .build
          npm install --omit=dev --ignore-scripts

          # Clean unnecessary files from node_modules
          find node_modules -name "*.md" -not -path "*/node_modules/.package-lock.json" -delete 2>/dev/null || true
          find node_modules -name "README*" -delete 2>/dev/null || true
          find node_modules -name "LICENSE*" -delete 2>/dev/null || true
          find node_modules -name "CHANGELOG*" -delete 2>/dev/null || true
          find node_modules -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name "__tests__" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name "doc" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name "example" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -type d -name ".github" -exec rm -rf {} + 2>/dev/null || true
          find node_modules -name "*.map" -delete 2>/dev/null || true
          find node_modules -name "*.d.ts" -delete 2>/dev/null || true

      - name: Build executable
        shell: bash
        run: |
          mkdir -p dist
          OUTPUT="dist/ddbot-wsa-webui${{ matrix.ext }}"

          npx caxa --input .build --output "$OUTPUT" \
            --no-dedupe \
            -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/server.js"

          if [ "${{ matrix.platform }}" != "windows" ]; then
            chmod +x "$OUTPUT"
          fi

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          NAME="ddbot-wsa-webui-${{ matrix.platform }}-${{ matrix.arch }}"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv "ddbot-wsa-webui.exe" "${NAME}.exe"
            echo "asset=${NAME}.exe" >> $GITHUB_ENV
          else
            mv "ddbot-wsa-webui" "${NAME}"
            echo "asset=${NAME}" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset }}
          path: dist/${{ env.asset }}

  # Linux ARM32 via QEMU (armv7/armhf)
  build-arm:
    runs-on: ubuntu-latest
    name: Build (linux-arm)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Build in ARM32 container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:20-bookworm-slim \
            bash -c '
              mkdir -p .build
              cp server.js .build/
              cp package.json .build/
              cp -r lib .build/
              cp -r public .build/
              cd .build
              npm install --omit=dev --ignore-scripts
              npm install caxa --save-dev
              npx caxa --input . --output /workspace/dist/ddbot-wsa-webui \
                --no-dedupe \
                -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/server.js"
              chmod +x /workspace/dist/ddbot-wsa-webui
            '

      - name: Rename artifact
        run: |
          sudo chown -R $(id -u):$(id -g) dist/
          cd dist
          mv ddbot-wsa-webui ddbot-wsa-webui-linux-arm
          echo "asset=ddbot-wsa-webui-linux-arm" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset }}
          path: dist/${{ env.asset }}

  release:
    needs: [build, build-arm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=$(git log --since="midnight" --oneline | wc -l | tr -d ' ')
          TAG="v0.${DATE}.${COUNT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate -30)
            COMPARE_BASE=$(git rev-list --max-parents=0 HEAD | head -1)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --no-decorate)
            COMPARE_BASE="$LAST_TAG"
          fi
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '[a-f0-9]' || echo 0)

          {
            echo "<div align=\"center\">"
            echo ""
            echo "# 🤖 DDBOT-WSa WebUI"
            echo ""
            echo "**${{ steps.version.outputs.tag }}** · ${COMMIT_COUNT} commits since ${COMPARE_BASE:0:7}"
            echo ""
            echo "DDBOT-WSa 的 Web 管理面板 · 通过浏览器管理 Bot 进程、订阅、配置、日志"
            echo ""
            echo "</div>"
            echo ""
            echo "---"
            echo ""

            # Changelog sections
            FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat" || true)
            FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ fix" || true)
            PERF=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ perf" || true)
            DOCS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ docs" || true)
            CI=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ ci" || true)
            OTHERS=$(echo "$COMMITS" | grep -ivE "^[a-f0-9]+ (feat|fix|perf|docs|ci)" || true)

            echo "## 📋 更新日志"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### 🚀 新功能"
              echo "$FEATURES" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug 修复"
              echo "$FIXES" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            if [ -n "$PERF" ]; then
              echo "### ⚡ 性能优化"
              echo "$PERF" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📝 文档更新"
              echo "$DOCS" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            if [ -n "$CI" ]; then
              echo "### 🔧 CI/构建"
              echo "$CI" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### 📦 其他变更"
              echo "$OTHERS" | sed 's/^[a-f0-9]*/-/'
              echo ""
            fi

            echo "---"
            echo ""
            echo "## 📥 下载与安装"
            echo ""
            echo "### 可用构建"
            echo ""
            echo "| 文件 | 平台 | 架构 | 适用设备 |"
            echo "|------|------|------|----------|"
            echo "| \`*-windows-amd64.exe\` | Windows | x64 | 大多数 PC、笔记本 |"
            echo "| \`*-linux-amd64\` | Linux | x64 | 服务器、桌面 Linux |"
            echo "| \`*-linux-arm64\` | Linux | ARM64 | 树莓派 4/5 (64位系统)、ARM 服务器 |"
            echo "| \`*-linux-arm\` | Linux | ARM32 | 树莓派 3/Zero、旧 ARM 设备 |"
            echo "| \`*-darwin-arm64\` | macOS | Apple Silicon | M1/M2/M3/M4 Mac |"
            echo ""
            echo "### 快速开始"
            echo ""
            echo '```bash'
            echo "# 1. 下载对应平台的可执行文件"
            echo "# 2. 放到 DDBOT-WSa 的上级目录"
            echo ""
            echo "# Windows"
            echo "ddbot-wsa-webui-windows-amd64.exe"
            echo ""
            echo "# Linux / macOS"
            echo "chmod +x ddbot-wsa-webui-linux-amd64"
            echo "./ddbot-wsa-webui-linux-amd64"
            echo ""
            echo "# 自定义端口和 Bot 目录"
            echo "WEBUI_PORT=8080 DDBOT_DIR=/path/to/bot ./ddbot-wsa-webui-linux-amd64"
            echo '```'
            echo ""
            echo "### 运行后目录结构"
            echo ""
            echo '```'
            echo "你的目录/"
            echo "├── ddbot-wsa-webui(.exe)    ← WebUI"
            echo "├── config.json              ← 自动生成"
            echo "├── log/                     ← WebUI 日志"
            echo "└── data/                    ← Bot 所有文件"
            echo "    ├── ddbot.exe            ← 放到这里"
            echo "    ├── application.yaml     ← 自动生成"
            echo "    ├── .lsp.db"
            echo "    └── logs/"
            echo '```'
            echo ""
            echo "### 功能概览"
            echo ""
            echo "| 功能 | 说明 |"
            echo "|------|------|"
            echo "| 🤖 进程管理 | 启动/停止/重启 Bot，支持开机自启 |"
            echo "| 🔌 适配器 | OneBot v11 / Satori / Telegram 配置与状态 |"
            echo "| 📺 订阅管理 | 增删改查订阅，对接 Bot Admin API |"
            echo "| 📋 日志 | 实时流式日志，按级别过滤 |"
            echo "| ⚙️ 配置 | 分类表单 + 原始 YAML 编辑器 |"
            echo ""
            echo "---"
            echo ""
            echo "**完整变更**: https://github.com/${{ github.repository }}/compare/${COMPARE_BASE}...${{ steps.version.outputs.tag }}"
            echo ""
            echo "> 📌 这是一个 **Pre-Release** 版本，可能存在不稳定因素。"
          } > changelog.md

          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DDBOT-WSa WebUI ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          prerelease: true
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
